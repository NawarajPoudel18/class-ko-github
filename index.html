<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Front Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background: #111;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }

        nav a:hover {
            color: #00ffcc;
        }

        .hero {
            height: 80vh;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            flex-direction: column;
        }

        .hero h1 {
            font-size: 40px;
        }

        .hero button {
            padding: 10px 20px;
            border: none;
            background: black;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        .hero button:hover {
            background: #00ffcc;
            color: black;
        }

        .section {
            padding: 40px;
            text-align: center;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h2>My Website 🚀</h2>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <div class="hero">
        <h1>Welcome to My Website</h1>
        <p>Learn. Build. Grow.</p>
        <button onclick="alert('You clicked me!')">Click Me</button>
    </div>

    <div class="section">
        <h2>About Us</h2>
        <p>This is a simple frontend webpage made using HTML & CSS.</p>
    </div>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
